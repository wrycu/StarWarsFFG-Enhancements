<div class="gear-ammo-settings" style="margin-top: 5px;">
    <div class="container flex-group-center weapon-values">
        <div class="resource single">
            <div class="attribute flex-group-center">
                <div class="block-background">
                    <div class="block-title">{{localize "ffg-star-wars-enhancements.special-ammo.can-be-ammo"}}</div>
                    <div class="block-attribute">
                        <div class="block-value block-single">
                            <input class="ranked-toggle" style="text-align: center;" type="checkbox" name="flags.ammo-data.canBeUsedAsAmmo" data-dtype="Boolean" {{#if canBeUsedAsAmmo}}checked{{/if}} />
                        </div>
                    </div>
                </div>
            </div>
        </div>

        {{#if canBeUsedAsAmmo}}
        <div class="resource split">
            <div class="attribute flex-group-center">
                <div class="block-background">
                    <div class="block-title">{{localize "ffg-star-wars-enhancements.special-ammo.ammo"}}</div>
                    <div class="block-attribute">
                        <div class="block-value">
                            <input type="text" name="flags.ammo-data.ammoMax" value="{{ammoMax}}" data-dtype="Number" />
                        </div>
                        <div class="block-value">
                            <input type="text" name="flags.ammo-data.ammoCurrent" value="{{ammoCurrent}}" data-dtype="Number" />
                        </div>
                    </div>
                </div>
                <div class="block-background-shadow">
                    <div class="shadow-left">
                        <div class="shadow-text">{{localize "ffg-star-wars-enhancements.special-ammo.threshold"}}</div>
                    </div>
                    <div class="shadow-right">
                        <div class="shadow-text">{{localize "ffg-star-wars-enhancements.special-ammo.current"}}</div>
                    </div>
                </div>
            </div>
        </div>
        {{/if}}
    </div>
</div>
