<form autocomplete="off" class="effg-talent-bulk-update">
    <div class="form-group">
        <label>{{localize "ffg-star-wars-enhancements.talent-bulk-update.source-label"}}</label>
        <div class="effg-bulk-source-wrapper" style="position: relative;">
            <input type="hidden" name="source" class="effg-bulk-source-value" value="" />
            <input type="text" class="effg-bulk-source-search" placeholder="-- {{localize 'ffg-star-wars-enhancements.talent-bulk-update.select-source'}} --" autocomplete="off" />
            <ul class="effg-bulk-source-list" style="display: none; position: absolute; z-index: 100; background: var(--color-bg, #fff); border: 1px solid #ccc; max-height: 200px; overflow-y: auto; width: 100%; margin: 0; padding: 0; list-style: none;">
                {{#each sources}}
                <li class="effg-bulk-source-option" data-value="{{this.value}}" data-label="{{this.label}}" style="padding: 4px 8px; cursor: pointer;">{{this.label}}</li>
                {{/each}}
            </ul>
        </div>
    </div>

    <hr>

    <div class="effg-bulk-rows">
        {{#each rows}}
        <div class="effg-bulk-row" style="border: 1px solid #ccc; padding: 8px; margin-bottom: 6px; border-radius: 4px;">
            <div class="form-group" style="margin-bottom: 4px;">
                <label>{{localize "ffg-star-wars-enhancements.talent-bulk-update.talent-names"}} <small>({{localize "ffg-star-wars-enhancements.talent-bulk-update.talent-names-hint"}})</small></label>
                <textarea class="effg-bulk-talent-names" data-row-index="{{@index}}" rows="3">{{this.talentNamesText}}</textarea>
            </div>

            <div class="form-group" style="flex-direction: column; align-items: stretch;">
                <label>{{localize "ffg-star-wars-enhancements.talent-skill-association-label"}}</label>
                {{#each this.skillRows}}
                <div style="display: flex; align-items: center; gap: 4px; margin-bottom: 4px;">
                    <select class="effg-bulk-skill-select" data-row-index="{{this.rowIndex}}" data-skill-index="{{this.skillIndex}}" style="flex: 1;">
                        {{{this.optionsHtml}}}
                    </select>
                    <a class="effg-bulk-add-skill" data-row-index="{{this.rowIndex}}" title="{{localize 'ffg-star-wars-enhancements.talent-skill-association-add'}}"><i class="fas fa-plus"></i></a>
                    {{#iff_custom this.showRemove "==" true}}
                    <a class="effg-bulk-remove-skill" data-row-index="{{this.rowIndex}}" data-skill-index="{{this.skillIndex}}" title="{{localize 'ffg-star-wars-enhancements.talent-skill-association-remove'}}"><i class="fas fa-minus"></i></a>
                    {{/iff_custom}}
                </div>
                {{/each}}
            </div>
        </div>
        {{/each}}
    </div>

    <div style="margin-top: 8px;">
        <button type="submit" name="submit"><i class="fas fa-save"></i> {{localize "ffg-star-wars-enhancements.talent-bulk-update.apply"}}</button>
    </div>
</form>
